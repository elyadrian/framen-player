<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
video { width:100%; height:100%; object-fit:contain; position:absolute; top:0; left:0; }
#msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-family:sans-serif; font-size:18px; }
</style>
</head>
<body>
<video id="v1" muted autoplay playsinline></video>
<video id="v2" muted playsinline style="display:none"></video>
<div id="msg">Loading...</div>
<script>
  var params = new URLSearchParams(window.location.search);
  var screenId = params.get("screen");
  var orgToken = "Org_2E7a3bJRHHf";

  if (!screenId) {
    document.getElementById("msg").textContent = "No screen ID provided.";
  } else {
    var API = "https://api.framen.com/v3/vendor/" + orgToken + "/1/rt_ad/" + screenId;
    var msg = document.getElementById("msg");
    var videos = [document.getElementById("v1"), document.getElementById("v2")];
    var current = 0;
    var nextUrl = null;
    var nextPop = null;

    function firePopUrl(url) {
      if (!url) return;
      var x = new XMLHttpRequest();
      x.open("GET", url, true);
      x.send();
    }

    function fetchNextAd(callback) {
      var x = new XMLHttpRequest();
      x.open("GET", API, true);
      x.onload = function() {
        try {
          var data = JSON.parse(x.responseText).data;
          var url = null, pop = null;
          if (data.ad && data.ad.url) { url = data.ad.url; pop = data.ad.pop; }
          else if (data.news && data.news.url) { url = data.news.url; pop = data.news.pop; }
          callback(url, pop);
        } catch(e) { callback(null, null); }
      };
      x.onerror = function() { callback(null, null); };
      x.send();
    }

    function preloadVideo(url, videoEl) {
      videoEl.src = url;
      videoEl.load();
    }

    function playNext(url, pop) {
      if (!url) {
        msg.textContent = "No ad available. Retrying...";
        msg.style.display = "block";
        setTimeout(start, 30000);
        return;
      }
      var curr = videos[current];
      var next = videos[1 - current];

      msg.style.display = "none";
      curr.style.display = "block";
      curr.src = url;
      curr.play();

      fetchNextAd(function(nextU, nextP) {
        nextUrl = nextU;
        nextPop = nextP;
        if (nextU) preloadVideo(nextU, next);
      });

      curr.onended = function() {
        firePopUrl(pop);
        curr.style.display = "none";
        next.style.display = "block";
        if (nextUrl) {
          next.play();
          current = 1 - current;
          var prevPop = nextPop;
          fetchNextAd(function(u, p) {
            nextUrl = u;
            nextPop = p;
            if (u) preloadVideo(u, curr);
          });
          videos[current].onended = function() {
            firePopUrl(prevPop);
            playNext(nextUrl, nextPop);
          };
        } else {
          setTimeout(start, 15000);
        }
      };
    }

    function start() {
      msg.textContent = "Loading...";
      msg.style.display = "block";
      fetchNextAd(function(url, pop) {
        if (url) { playNext(url, pop); }
        else { msg.textContent = "No ad available. Retrying..."; setTimeout(start, 30000); }
      });
    }

    start();
  }
</script>
</body>
</html>
