<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Framen Ad Player</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.6.1/video-js.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #framen-video { width: 100% !important; height: 100% !important; }
  .video-js { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>
<video id="framen-video" class="video-js vjs-default-skin" autoplay muted playsinline></video>

<script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.6.1/video.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/6.9.0/videojs.ads.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/1.10.2/videojs.ima.min.js"></script>
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
<script>
  var VAST_URL = "https://api.framen.com/v3/vendor/Org_2E7a3bJRHHf/players/64d13f7c-00b5-4743-b915-6619834a9e78/vast2";

  var player = videojs("framen-video", {
    autoplay: true,
    muted: true,
    controls: false
  });

  player.ima({
    adTagUrl: VAST_URL,
    disableCustomPlaybackForIOS10Plus: true
  });

  player.ima.requestAds();

  player.on("adended", function() {
    setTimeout(function() {
      player.ima.requestAds();
    }, 1000);
  });
</script>
</body>
</html>
