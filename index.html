<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
video { width:100%; height:100%; object-fit:contain; }
#msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-family:sans-serif; font-size:18px; }
</style>
</head>
<body>
<video id="v" muted autoplay playsinline></video>
<div id="msg">Loading...</div>
<script>
var API = "https://api.framen.com/v3/vendor/Org_2E7a3bJRHHf/1/rt_ad/64d13f7c-00b5-4743-b915-6619834a9e78";
var v = document.getElementById("v");
var msg = document.getElementById("msg");

function firePopUrl(url) {
  if (!url) return;
  var x = new XMLHttpRequest();
  x.open("GET", url, true);
  x.send();
}

function requestAd() {
  msg.textContent = "Loading...";
  msg.style.display = "block";
  v.style.display = "none";

  var x = new XMLHttpRequest();
  x.open("GET", API, true);
  x.onload = function() {
    try {
      var data = JSON.parse(x.responseText).data;
      var videoUrl = null;
      var popUrl = null;

      if (data.ad && data.ad.url) {
        videoUrl = data.ad.url;
        popUrl = data.ad.pop;
      } else if (data.news && data.news.url) {
        videoUrl = data.news.url;
        popUrl = data.news.pop;
      }

      if (videoUrl) {
        msg.style.display = "none";
        v.style.display = "block";
        v.src = videoUrl;
        v.play();
        v.onended = function() {
          firePopUrl(popUrl);
          setTimeout(requestAd, 500);
        };
      } else {
        msg.textContent = "No ad available. Retrying...";
        setTimeout(requestAd, 30000);
      }
    } catch(e) {
      msg.textContent = "Retrying...";
      setTimeout(requestAd, 15000);
    }
  };
  x.onerror = function() {
    msg.textContent = "Retrying...";
    setTimeout(requestAd, 15000);
  };
  x.send();
}

requestAd();
</script>
</body>
</html>
